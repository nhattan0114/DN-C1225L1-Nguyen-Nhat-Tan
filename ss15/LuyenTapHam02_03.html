<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>03</title>
</head>
<body>
<script>
    function tinhGiaiThua(n){
        let result=1
        for (let i = 1; i <=n ; i++) {
            result *=i
        }
        return result
    }
    let input=+prompt("Nhập số:")
    let result=tinhGiaiThua(input)
    document.writeln("Result: "+result)
</script>
</body>
</html>
