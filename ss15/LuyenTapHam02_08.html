<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>08</title>
</head>
<body>
<p id="result"></p>
<script>
  function reverse(a) {
    let b=[]
    for (let i = a.length-1; i >= 0; i--) {
      b.push(a[i])
    }
    return b
  }

  let a= new Array(2)
  for (let i = 0; i <a.length ; i++) {
    a[i]= +prompt("Nhập a["+i+"]:")
  }
  let b=reverse(a)
  //let b=a.slice().reverse() slice():tao bang sao,reverse():dao mang
  document.getElementById("result").innerHTML=b.join(",")
</script>
</body>
</html>
