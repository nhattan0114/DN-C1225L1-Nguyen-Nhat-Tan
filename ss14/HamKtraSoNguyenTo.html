<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KtraSoNguyenTo</title>
</head>
<body>

<label for="input">Nhập số cần ktra: </label><input id="input">
<button onclick="Display()">Kiểm tra</button><br>
<p id="result">Kết quả: </p>
<script>

    function isPrime(number) {
            if(number<2) return false
        for (let i = 2; i <=Math.sqrt(number) ; i++) {
            if(number %i===0){
                return false
            }

        }

        return true
    }
    function Display(){
        let num=+document.getElementById("input").value
        if (isPrime(num)){
            document.getElementById("result").innerText=`Kết quả: ${num} là số nguyên tố`

        }
        else{
            document.getElementById("result").innerText=`Kết quả: ${num} không phải số nguyên tố`

        }
    }

</script>
</body>
</html>
