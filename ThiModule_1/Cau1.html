<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cau1</title>
</head>
<body>
<script>
let n
  do {
        n = +prompt("Nhập số phần tử(<=50):")
    if(n<=0||n>50||isNaN(n)){
      alert("Nhập lại,số phần tử từ 1->50!")
    }
  }while(n<=0||n>50||isNaN(n))

    let arr = new Array(n)

  for (let i = 0; i <n ; i++) {
    arr[i] = +prompt("Nhập số["+(i+1)+"]")
  }

  document.writeln("Mảng: "+arr.join(",")+"<br>")

let sum=0
let count =0
for (let i = 0; i <n ; i++) {
  if(arr[i]%3===0){
    sum += arr[i]
    count++
  }
}
if(count===0){
  document.writeln("Không có số nào trong mảng chia hết cho 3")
}
else{
  document.writeln("Trung bình cộng của các số chia hết cho 3: "+(sum/count).toFixed(2))

}


</script>
</body>
</html>
